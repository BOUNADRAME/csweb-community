<VirtualHost *:80>
    ServerAdmin admin@csweb.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Enable URL rewriting
        RewriteEngine On

        # Redirect to setup if config.php doesn't exist
        RewriteCond %{REQUEST_URI} !^/setup
        RewriteCond %{DOCUMENT_ROOT}/src/AppBundle/config.php !-f
        RewriteRule ^(.*)$ /setup/ [R=302,L]
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/csweb-error.log
    CustomLog ${APACHE_LOG_DIR}/csweb-access.log combined

    # PHP configuration
    php_value upload_max_filesize 100M
    php_value post_max_size 100M
    php_value max_execution_time 300
    php_value memory_limit 512M
</VirtualHost>
